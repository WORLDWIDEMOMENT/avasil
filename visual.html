*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;font-family:'Barlow',sans-serif;color:#f5f5f5;overflow:hidden}

body{display:flex;flex-direction:column}

/* MAIN SCROLL CONTAINER */
.scroll-container{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
  padding-bottom:80px;
}

.scroll-container::-webkit-scrollbar{height:4px}
.scroll-container::-webkit-scrollbar-track{background:#1a1a1a}
.scroll-container::-webkit-scrollbar-thumb{background:#666;border-radius:2px}

/* COLUMN - VERTICAL STACK */
.column{
  flex-shrink:0;
  width:180px;
  height:calc(100vh - 80px);
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:30px 15px;
  gap:8px;
}

/* PROJECT HEADER */
.column-header{
  position:relative;
  text-align:center;
  margin-bottom:15px;
  z-index:10;
}

.column-year{
  font-size:9px;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:#999;
}

.column-title{
  font-size:11px;
  font-weight:900;
  letter-spacing:-.01em;
  text-transform:uppercase;
  margin-top:3px;
  color:#f5f5f5;
}

/* IMAGE ITEM */
.image-item{
  position:relative;
  cursor:pointer;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  transform-origin:center;
  border:1px solid rgba(255,255,255,.08);
  background:#1a1a1a;
  overflow:hidden;
  border-radius:1px;
  flex-shrink:0;
}

.image-item img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

/* CLICKED STATE */
.image-item.active{
  transform:scale(1.6)!important;
  z-index:999!important;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}

/* HEADER */
.hdr{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:52px;
  display:flex;
  align-items:center;
  padding:0 36px;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.05);
  z-index:150;
}

.back{
  font-size:12px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  text-decoration:none;
  color:#666;
  transition:color .2s;
}

.back:hover{color:#f5f5f5}

/* TIMELINE - BOTTOM FIXED */
.timeline-bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:60px;
  background:linear-gradient(to top,rgba(10,10,10,.98),rgba(10,10,10,.9));
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;
  align-items:center;
  z-index:200;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-behavior:smooth;
}

.timeline-bottom::-webkit-scrollbar{height:3px}
.timeline-bottom::-webkit-scrollbar-track{background:transparent}
.timeline-bottom::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

/* TIMELINE LINE */
.timeline-line{
  position:absolute;
  bottom:50%;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,.1);
  transform:translateY(50%);
  z-index:1;
}

/* TIMELINE CONTENT */
.timeline-content{
  position:relative;
  height:100%;
  display:flex;
  align-items:center;
  padding:0 40px;
  gap:120px;
  z-index:2;
  min-width:min-content;
}

/* YEAR MARKER */
.year-marker{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}

.year-dot{
  width:4px;
  height:4px;
  background:#666;
  border-radius:50%;
  transition:all .3s;
}

.year-marker.major .year-dot{
  width:5px;
  height:5px;
  background:#999;
}

.year-label{
  font-size:8px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#999;
}

.month-label{
  font-size:7px;
  font-weight:500;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#666;
  margin-top:2px;
}

<script>
let activeImage = null;

function toggleImage(element) {
  if(activeImage === element) {
    element.classList.remove('active');
    activeImage = null;
  } else {
    if(activeImage) {
      activeImage.classList.remove('active');
    }
    element.classList.add('active');
    activeImage = element;
  }
}

const scrollContainer = document.getElementById('scrollContainer');
const timelineBottom = document.getElementById('timelineBottom');

scrollContainer.addEventListener('scroll', () => {
  timelineBottom.scrollLeft = scrollContainer.scrollLeft;
});

timelineBottom.addEventListener('scroll', () => {
  scrollContainer.scrollLeft = timelineBottom.scrollLeft;
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape' && activeImage) {
    activeImage.classList.remove('active');
    activeImage = null;
  }
});
</script>
