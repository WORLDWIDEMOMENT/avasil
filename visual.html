<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Archive — AV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--fg:#f5f5f5;--dim:#888;--accent:#4d6aff;--sans:'Barlow',sans-serif;}
html,body{width:100%;height:100%;background:var(--bg);font-family:var(--sans);color:var(--fg);}
body{overflow-x:hidden;overflow-y:auto;padding:100px 40px;}

.hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 36px;background:rgba(15,15,15,.95);backdrop-filter:blur(10px);}
.back{font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:var(--dim);transition:color .2s;}
.back:hover{color:var(--fg);}

/* TIMELINE CONTAINER */
.timeline-wrapper{position:relative;width:100%;max-width:1600px;margin:0 auto;}

/* TIMELINE LINE */
.timeline-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),rgba(77,106,255,.1));transform:translateX(-50%);}

/* YEARS LABELS */
.years-row{display:flex;justify-content:space-between;margin-bottom:120px;position:relative;z-index:1;}
.year-label{font-size:14px;font-weight:900;color:var(--accent);letter-spacing:.1em;position:relative;margin:0 40px;white-space:nowrap;}
.year-label::before{content:'●';position:absolute;left:50%;top:-22px;transform:translateX(-50%);font-size:12px;}

/* COLUMNS CONTAINER */
.columns-container{position:relative;display:flex;justify-content:space-between;margin-bottom:60px;gap:20px;}

/* SINGLE COLUMN */
.column{position:relative;width:45%;display:flex;flex-direction:column;gap:20px;}
.column.right{margin-left:auto;}

/* IMAGES IN COLUMN */
.image-item{
  position:relative;
  cursor:pointer;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  transform-origin:center;
}
.image-item:hover{
  transform:scale(1.05);
  filter:brightness(1.2) drop-shadow(0 10px 30px rgba(77,106,255,.4));
  z-index:100;
}
.image-item img{
  width:100%;
  display:block;
  border:1px solid rgba(255,255,255,.1);
  background:#1a1a1a;
  aspect-ratio:3/2;
  object-fit:cover;
  border-radius:2px;
}

/* MODAL */
.modal{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.95);backdrop-filter:blur(10px);
  opacity:0;visibility:hidden;
  transition:opacity .3s,visibility .3s;
  padding:40px;
}
.modal.active{opacity:1;visibility:visible;}
.modal-content{
  position:relative;
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,.1);
  max-width:90vw;
  max-height:90vh;
  display:flex;
  border-radius:3px;
  overflow:hidden;
}
.modal-image{flex:1;min-width:0;}
.modal-image img{width:100%;height:100%;object-fit:contain;}
.modal-info{
  width:300px;
  padding:40px;
  display:flex;flex-direction:column;
  gap:20px;
  overflow-y:auto;
  border-left:1px solid rgba(255,255,255,.1);
}
.modal-title{font-size:24px;font-weight:900;letter-spacing:-.01em;color:var(--fg);}
.modal-subtitle{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);}
.modal-desc{font-size:13px;line-height:1.6;color:var(--dim);flex:1;}
.modal-nav{display:flex;gap:10px;margin-top:20px;}
.modal-nav button{
  flex:1;padding:10px;border:1px solid rgba(255,255,255,.2);
  background:none;color:var(--fg);cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:.1em;
  transition:all .2s;
}
.modal-nav button:hover{background:var(--accent);border-color:var(--accent);color:#000;}
.modal-close{position:absolute;top:20px;right:20px;background:none;border:none;color:var(--dim);font-size:24px;cursor:pointer;z-index:10;transition:color .2s;}
.modal-close:hover{color:var(--fg);}

/* FOOTER */
.ftl{position:fixed;bottom:24px;left:36px;z-index:50;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.ftl a{color:var(--fg);text-decoration:none;opacity:.28;transition:opacity .2s;}
.ftl a:hover{opacity:1;}
.ftr{position:fixed;bottom:24px;right:36px;z-index:50;display:flex;gap:10px;align-items:center;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
.ftr a{color:var(--fg);text-decoration:none;opacity:.28;transition:opacity .2s;}
.ftr a:hover{opacity:1;}
.ftr span{opacity:.1;color:var(--fg);}

@media(max-width:1024px){
  .timeline-line{display:none;}
  .columns-container{flex-direction:column;}
  .column{width:100%;margin-left:0!important;}
  .modal-content{flex-direction:column;}
  .modal-info{width:100%;border-left:none;border-top:1px solid rgba(255,255,255,.1);}
}
</style>
</head>
<body>

<div class="hdr"><a href="index.html" class="back">← Back</a></div>

<div class="timeline-wrapper" id="timeline">
  <div class="timeline-line"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content">
    <div class="modal-image"><img id="modalImg" src="" alt=""></div>
    <div class="modal-info">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
      <p class="modal-desc" id="modalDesc"></p>
      <div class="modal-nav">
        <button id="prevBtn">← Prev</button>
        <button id="nextBtn">Next →</button>
      </div>
    </div>
  </div>
</div>

<div class="ftl"><a href="about.html">About</a></div>
<div class="ftr">
  <a href="mailto:navilen@bk.ru">navilen@bk.ru</a><span>—</span>
  <a href="https://instagram.com/molodostibolshenebudet/" target="_blank">Instagram</a><span>—</span>
  <a href="https://behance.net/avasileuskaya" target="_blank">Behance</a><span>—</span>
  <a href="https://linkedin.com/in/worldwidemoment/" target="_blank">LinkedIn</a>
</div>

<script>
const projects = [
  {
    year: 2019, name: 'PILOTS', subtitle: 'HAND DRAWINGS', 
    path: 'images/assets/create/pilots/pilots',
    count: 15,
    desc: 'When I was younger, they shaped everything.\nAll my pain redirected through their image.\nEvery piece a different style, a different state.'
  },
  {
    year: 2020, name: 'PORTRAIT', subtitle: 'NONE OF THEM IS ME',
    path: 'images/assets/create/portrait/Portrait',
    count: 6,
    desc: 'A series about the gap between how you see yourself and how you appear.\n\nNone of the versions is definitive.'
  },
  {
    year: 2022, name: 'SCAN', subtitle: 'GRAINS OF THE CITIES',
    path: 'images/assets/create/scan/Scan',
    count: 10,
    desc: 'Cities leave marks.\nScanned surfaces, found materials.\nConcrete, rust, fabric, stone.'
  },
  {
    year: 2023, name: 'CLO', subtitle: 'CUSTOM CLOTHING',
    path: 'images/assets/create/clo/cloth',
    count: 20,
    desc: 'Hand-painted garments.\nNo sketch, no transfer.\nThe painting grew from the fabric up.'
  },
  {
    year: 2024, name: 'BTI', subtitle: 'BEFORE THE IMPACT',
    path: 'images/assets/create/bti/bti',
    count: 4,
    desc: 'Silent Horizon explores the moment when an ordinary landscape becomes the stage for an unexpected event.\n\nThe four-frame sequence captures a gradual shift in perception. What begins as a quiet, open field occupied by distant human figures transforms into a scene of tension and observation as a sudden trajectory appears in the sky.\n\nThe work investigates the relationship between landscape, technology, and the human witness. The scale of the environment contrasts with the fragility of human presence, emphasizing how rapidly familiar spaces can be redefined by unforeseen events.\n\nRather than depicting a specific narrative, the sequence reflects on perception, distance, and the transformation of landscape into a site of memory.'
  }
];

let currentProject = null;
let currentImageIdx = 0;

const timeline = document.getElementById('timeline');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const modalTitle = document.getElementById('modalTitle');
const modalSubtitle = document.getElementById('modalSubtitle');
const modalDesc = document.getElementById('modalDesc');
const modalClose = document.getElementById('modalClose');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

// Build timeline
projects.forEach((proj, idx) => {
  const yearsRow = document.createElement('div');
  yearsRow.className = 'years-row';
  yearsRow.innerHTML = `<div class="year-label">${proj.year}</div>`;
  timeline.appendChild(yearsRow);

  const colsContainer = document.createElement('div');
  colsContainer.className = 'columns-container';

  // Alternate left-right
  const isLeft = idx % 2 === 0;
  const leftCol = document.createElement('div');
  leftCol.className = 'column' + (isLeft ? '' : ' right');
  
  // Add images
  for(let i = 1; i <= proj.count; i++){
    const item = document.createElement('div');
    item.className = 'image-item';
    const img = document.createElement('img');
    img.src = `${proj.path}${i}.jpg`;
    img.alt = `${proj.name} ${i}`;
    img.onerror = function(){this.style.opacity = '0.3';};
    item.appendChild(img);
    
    item.addEventListener('click', () => openModal(proj, i - 1));
    leftCol.appendChild(item);
  }

  colsContainer.appendChild(leftCol);
  timeline.appendChild(colsContainer);
});

function openModal(proj, idx) {
  currentProject = proj;
  currentImageIdx = idx;
  showImage();
  modal.classList.add('active');
}

function showImage() {
  const proj = currentProject;
  const num = currentImageIdx + 1;
  modalImg.src = `${proj.path}${num}.jpg`;
  modalTitle.textContent = proj.name;
  modalSubtitle.textContent = proj.subtitle;
  modalDesc.textContent = proj.desc;
}

modalClose.addEventListener('click', () => modal.classList.remove('active'));
modal.addEventListener('click', (e) => {
  if(e.target === modal) modal.classList.remove('active');
});

prevBtn.addEventListener('click', () => {
  currentImageIdx = (currentImageIdx - 1 + currentProject.count) % currentProject.count;
  showImage();
});

nextBtn.addEventListener('click', () => {
  currentImageIdx = (currentImageIdx + 1) % currentProject.count;
  showImage();
});

document.addEventListener('keydown', (e) => {
  if(!modal.classList.contains('active')) return;
  if(e.key === 'Escape') modal.classList.remove('active');
  if(e.key === 'ArrowLeft') prevBtn.click();
  if(e.key === 'ArrowRight') nextBtn.click();
});
</script>

</body>
</html>
